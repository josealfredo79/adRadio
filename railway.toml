[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "frontend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "alembic upgrade head && celery -A app.workers.celery_app worker --loglevel=info -Q whatsapp,campaigns,processing -c 1 > celery_worker.log 2>&1 & celery -A app.workers.celery_app beat --loglevel=info > celery_beat.log 2>&1 & uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8080}"
